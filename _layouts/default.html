<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Alegreya:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400&display=swap');

  :root {
    --ember: #FF6A00;
    --hellfire: #FF9500;
    --brimstone: #FFBE44;
    --charcoal: #0d0a08;
    --smoke: #2a2420;
    --smoke-light: #3a3230;
    --bone: #d4c5a9;
    --bone-dim: #a89878;
    --chain: #8a7a60;
    --soul-blue: #6a9aff;
    --code-bg: #1a1510;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--charcoal);
    color: var(--bone);
    font-family: 'Alegreya', Georgia, serif;
    font-size: 17px;
    line-height: 1.75;
    min-height: 100vh;
  }

  .site-header {
    text-align: center;
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid rgba(255,106,0,0.12);
  }

  .site-header a {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    background: linear-gradient(180deg, var(--brimstone) 0%, var(--ember) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .site-header a:hover {
    filter: brightness(1.2);
  }

  .site-header .back-arrow {
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    -webkit-text-fill-color: var(--chain);
    background: none;
  }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* Headings */
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Cinzel', serif;
    color: var(--brimstone);
    margin-top: 2.2rem;
    margin-bottom: 0.8rem;
    line-height: 1.3;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(180deg, var(--brimstone) 0%, var(--ember) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,106,0,0.15);
  }

  h2 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--hellfire);
    padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(255,106,0,0.1);
  }

  h3 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--brimstone);
  }

  h4, h5, h6 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--bone);
  }

  /* Paragraphs & text */
  p { margin-bottom: 1rem; }

  strong { color: #e8d8b8; }

  em { color: var(--bone-dim); }

  /* Links */
  a {
    color: var(--soul-blue);
    text-decoration: none;
    border-bottom: 1px solid rgba(106,154,255,0.25);
    transition: all 0.2s ease;
  }

  a:hover {
    color: #8ab4ff;
    border-bottom-color: rgba(106,154,255,0.6);
  }

  /* Horizontal rules */
  hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--chain), transparent);
    margin: 2rem 0;
    opacity: 0.4;
  }

  /* Lists */
  ul, ol {
    margin: 0.5rem 0 1rem 1.5rem;
  }

  li {
    margin-bottom: 0.3rem;
  }

  li::marker {
    color: var(--ember);
  }

  /* Blockquotes / Obsidian callouts */
  blockquote {
    border-left: 3px solid var(--ember);
    background: rgba(42,36,32,0.6);
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    border-radius: 0 6px 6px 0;
  }

  blockquote p:last-child { margin-bottom: 0; }

  /* Code */
  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    background: var(--code-bg);
    border: 1px solid rgba(138,122,96,0.2);
    border-radius: 3px;
    padding: 2px 6px;
    color: var(--hellfire);
  }

  pre {
    background: var(--code-bg);
    border: 1px solid rgba(138,122,96,0.15);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 1rem 0;
  }

  pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--bone);
    font-size: 0.82em;
    line-height: 1.6;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.92em;
  }

  th {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.8em;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--hellfire);
    background: rgba(255,106,0,0.06);
    border-bottom: 2px solid rgba(255,106,0,0.2);
    padding: 0.6rem 0.75rem;
    text-align: left;
  }

  td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid rgba(138,122,96,0.1);
  }

  tr:hover td {
    background: rgba(42,36,32,0.4);
  }

  /* Images */
  img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    margin: 1rem 0;
    border: 1px solid rgba(138,122,96,0.15);
  }

  /* Task lists */
  input[type="checkbox"] {
    accent-color: var(--ember);
    margin-right: 0.4rem;
  }

  /* YAML frontmatter title override */
  .page-title {
    font-family: 'Cinzel', serif;
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(180deg, var(--brimstone) 0%, var(--ember) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,106,0,0.15);
  }

  /* Footer */
  .site-footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: rgba(138,122,96,0.4);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    border-top: 1px solid rgba(138,122,96,0.1);
  }

  .site-footer a {
    color: var(--chain);
    border: none;
  }

  .site-footer a:hover {
    color: var(--hellfire);
  }

  /* Responsive */
  @media (max-width: 600px) {
    main { padding: 1.5rem 1.25rem 3rem; }
    h1 { font-size: 1.5rem; }
    table { font-size: 0.82em; }
    th, td { padding: 0.4rem 0.5rem; }
  }
</style>
</head>
<body>

  <div class="site-header">
    <a href="{{ '/' | relative_url }}"><span class="back-arrow">&larr;</span> Ghost Rider</a>
  </div>

  <main>
    {{ content }}
  </main>

  <div class="site-footer">
    <a href="{{ '/' | relative_url }}">Back to vault index</a> &middot; Pathfinder 1E &middot; Spirit of Vengeance
  </div>

</body>
</html>
